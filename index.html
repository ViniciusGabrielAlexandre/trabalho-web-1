<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biblioteca Online</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<header id="cabecalho">



</header>


<main>

<section id="home">

<h2>Bem-vindo à Biblioteca</h2>

<p>
Sistema para organizar livros de forma simples e prática.
</p>

</section>



<section id="cadastrar">

<h2>Cadastrar Livro</h2>

<form id="formLivro">

<label for="titulo">Título *</label>
<input type="text" id="titulo" required>

<label for="autor">Autor *</label>
<input type="text" id="autor" required>

<label for="ano">Ano *</label>
<input type="number" id="ano" required>

<label for="genero">Gênero *</label>
<input type="text" id="genero" required>

<button type="button" onclick="salvarDados()">Salvar</button>
<button type="reset">Limpar</button>

</form>

<p id="mensagemErro"></p>

</section>

<section id="listar">
<h2>Lista de Livros</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Título</th>
<th>Autor</th>
<th>Ano</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaLivros"></tbody>

</table>

</section>

<section id="sobre">
<h2>Sobre</h2>
<p>POC de sistema web com HTML, CSS e JS.</p>
</section>

</main>

<footer>
<p>Equipe: Vinícius Alexandre | Vinicius Theiss</p>
</footer>

<script>

// HEADER
fetch('header.html')
.then(r => r.text())
.then(data => document.getElementById('cabecalho').innerHTML = data);

// CRUD
let livros = [];
let editando = null;

const form = document.getElementById("formLivro");
const tabela = document.getElementById("tabelaLivros");
const erro = document.getElementById("mensagemErro");

form.addEventListener("submit", function(e){
e.preventDefault();

let titulo = document.getElementById("titulo").value.trim();
let autor = document.getElementById("autor").value.trim();
let ano = document.getElementById("ano").value.trim();
let genero = document.getElementById("genero").value.trim();

if(!titulo || !autor || !ano || !genero){
erro.innerText = "Preencha todos os campos!";
return;
}

erro.innerText = "";

if(editando !== null){
livros[editando] = {titulo, autor, ano, genero};
editando = null;
}else{
livros.push({titulo, autor, ano, genero});
}

form.reset();
renderTabela();
});

function renderTabela(){
tabela.innerHTML = "";

livros.forEach((livro, index)=>{
let linha = `
<tr>
<td>${index+1}</td>
<td>${livro.titulo}</td>
<td>${livro.autor}</td>
<td>${livro.ano}</td>
<td>
<button onclick="editar(${index})">Editar</button>
<button onclick="excluir(${index})">Excluir</button>
</td>
</tr>
`;
tabela.innerHTML += linha;
});
}

function editar(index){
let livro = livros[index];

document.getElementById("titulo").value = livro.titulo;
document.getElementById("autor").value = livro.autor;
document.getElementById("ano").value = livro.ano;
document.getElementById("genero").value = livro.genero;

editando = index;
window.location.href = "#cadastrar";
}

function excluir(index){
livros.splice(index,1);
renderTabela();
}

//salvar dados
function salvarDados() {
    var titulo = document.getElementById("titulo").value;
    var autor = document.getElementById("autor").value;

    localStorage.setItem("titulo", titulo);
    localStorage.setItem("autor", autor);

}

function lerDados() {
    document.getElementById("titulo").value = localStorage.getItem("titulo");
    document.getElementById("autor").value = localStorage.getItem("autor");

    console.log(localStorage.dados);
}

</script>

</body>
</html>
